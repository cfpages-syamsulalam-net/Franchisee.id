name = "franchisee-id"
compatibility_date = "2026-06-16"
pages_build_output_dir = "dist"

# Active D1 config for the shared franchise network database.
# Pages projects do not support account_id in wrangler.toml.
# Remote apply still requires cfman or CLOUDFLARE_ACCOUNT_ID/API token context for this UUID.
[[d1_databases]]
binding = "franchise_db"
database_name = "franchise_db"
database_id = "812cd8ac-edd0-45d9-981f-c9a15358317b"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "FRANCHISE_ASSETS"
bucket_name = "franchise-assets"
